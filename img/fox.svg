<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 96">
  <!-- Left ear outer dark -->
  <polygon points="10,38 19,8 29,42" fill="#1E3A8A"/>
  <!-- Right ear outer dark -->
  <polygon points="70,38 61,8 51,42" fill="#1E3A8A"/>
  <!-- Left ear inner -->
  <polygon points="13,36 19,13 27,40" fill="#3B82F6"/>
  <!-- Right ear inner -->
  <polygon points="67,36 61,13 53,40" fill="#3B82F6"/>

  <!-- Head top dark left -->
  <polygon points="19,38 29,42 24,50" fill="#1D4ED8"/>
  <!-- Head top dark right -->
  <polygon points="61,38 51,42 56,50" fill="#1D4ED8"/>
  <!-- Head center light -->
  <polygon points="29,42 40,28 51,42 48,58 32,58" fill="#60A5FA"/>
  <!-- Head left face -->
  <polygon points="19,38 29,42 24,50 18,52" fill="#2563EB"/>
  <!-- Head right face -->
  <polygon points="61,38 51,42 56,50 62,52" fill="#2563EB"/>

  <!-- Cheeks / lower face lighter -->
  <polygon points="24,50 32,58 28,64" fill="#93C5FD"/>
  <polygon points="56,50 48,58 52,64" fill="#93C5FD"/>

  <!-- Muzzle center -->
  <polygon points="32,58 40,62 48,58 44,66 36,66" fill="#BFDBFE"/>
  <!-- Nose -->
  <ellipse cx="40" cy="64" rx="3" ry="2.5" fill="#1E3A8A"/>

  <!-- Eyes -->
  <ellipse cx="32" cy="46" rx="3.5" ry="3" fill="#1E3A8A"/>
  <ellipse cx="48" cy="46" rx="3.5" ry="3" fill="#1E3A8A"/>
  <!-- Eye highlights -->
  <circle cx="33.2" cy="44.8" r="1" fill="white"/>
  <circle cx="49.2" cy="44.8" r="1" fill="white"/>

  <!-- Body upper -->
  <polygon points="16,60 24,56 56,56 64,60 62,76 18,76" fill="#2563EB"/>
  <!-- Body left shadow -->
  <polygon points="16,60 18,76 10,80" fill="#1E3A8A"/>
  <!-- Body right shadow -->
  <polygon points="64,60 62,76 70,80" fill="#1E3A8A"/>

  <!-- Belly lighter center -->
  <polygon points="28,60 40,68 52,60 54,76 26,76" fill="#3B82F6"/>

  <!-- Body lower -->
  <polygon points="22,76 58,76 60,86 20,86" fill="#1D4ED8"/>

  <!-- Left paw gold -->
  <polygon points="20,84 28,80 31,92 18,92" fill="#EAB308"/>
  <!-- Right paw gold -->
  <polygon points="60,84 52,80 49,92 62,92" fill="#EAB308"/>

  <!-- Tail peek right -->
  <polygon points="62,70 74,62 77,78 66,80" fill="#60A5FA"/>
  <polygon points="72,63 77,58 79,70 74,72" fill="#93C5FD"/>
</svg>
